# pnpm 11 blocks all dependency build scripts by default. Each package
# that legitimately needs to run install/postinstall scripts must be
# listed here with `true`. Add an entry whenever a new transitive dep
# with a build step shows up in a `pnpm install` warning.
#
# Note: this file mirrors the `allowBuilds` block in the parent
# workspace yaml (../pnpm-workspace.yaml). The parent yaml is not seen
# by Cloudflare Pages because only this directory is checked out there,
# so the allowlist must live locally to keep the CI build working.
# Keep both files in sync when adding new entries.
allowBuilds:
  "@swc/core": true
  esbuild: true
  sharp: true
  workerd: true

# First-party packages are published by us during release workflows, so they
# do not need pnpm's minimum release age delay in Cloudflare Pages builds.
minimumReleaseAgeExclude:
  - mindoodb
  - mindoodb-app-sdk
  - mindoodb-view-language

# Local development against unreleased mindoodb-app-sdk /
# mindoodb-view-language versions is handled by .pnpmfile.cjs: it
# redirects the registry dependencies to the tarballs in the sibling
# checkouts when they exist (kl_npminstall.sh passes the hook file
# explicitly via --pnpmfile because --ignore-workspace skips
# auto-discovery).
